alerts:
  - name: billing_newly_started
    description: 未課金プロジェクトの課金開始検知（日次バッチ実行後に確認）
    schedule: "0 9 * * *"           # 毎日 09:00 JST（日次バッチ 02:00 完了後）
    query: |
      SELECT
        sub_account_name,
        project_id,
        first_billed_month,
        FORMAT_TIMESTAMP('%Y-%m-%d', linked_at, 'Asia/Tokyo') AS linked_date
      FROM `{project}.{dataset}.billing_project_links`
      WHERE billing_newly_started = TRUE
      ORDER BY first_billed_month DESC, sub_account_name
    channel: "#sales-alerts"        # 要変更：営業向けチャンネル
    message: "課金開始プロジェクトが検出されました"
    enabled: true

  - name: zero_cost_projects
    description: 前月請求金額が0円のアクティブプロジェクト一覧（月次バッチ翌日に確認）
    schedule: "0 9 6 * *"           # 毎月6日 09:00 JST（月次バッチが5日 03:00 完了後）
    query: |
      SELECT
        sub_account_name,
        project_id,
        prev_month_cost,
        ever_billed,
        FORMAT_TIMESTAMP('%Y-%m-%d', linked_at, 'Asia/Tokyo') AS linked_date
      FROM `{project}.{dataset}.billing_project_links`
      WHERE prev_month_cost = 0
        AND status = 'ACTIVE'
      ORDER BY ever_billed, linked_at, sub_account_name
    channel: "#cs-alerts"           # 要変更：CS向けチャンネル
    message: "前月請求が0円のプロジェクト一覧"
    enabled: true

  - name: never_billed_projects
    description: 過去に一度も課金がないアクティブプロジェクト一覧（月次確認）
    schedule: "0 9 1 * *"           # 毎月1日 09:00 JST
    query: |
      SELECT
        sub_account_name,
        project_id,
        FORMAT_TIMESTAMP('%Y-%m-%d', linked_at, 'Asia/Tokyo') AS linked_date
      FROM `{project}.{dataset}.billing_project_links`
      WHERE ever_billed = FALSE
        AND status = 'ACTIVE'
      ORDER BY linked_at, sub_account_name
    channel: "#cs-alerts"           # 要変更：CS向けチャンネル
    message: "過去に一度も課金がないプロジェクト一覧"
    enabled: true

  - name: cost_surge_projects
    description: |
      前月の請求金額が前々月より30%以上増加したアクティブプロジェクト一覧（月次確認）。
      閾値を変更する場合は query 内の `* 1.30` を修正する（例: 50%増 → `* 1.50`）。
    schedule: "0 9 7 * *"           # 毎月7日 09:00 JST（月次バッチが5日完了後、Export確定に余裕を持たせて7日）
    query: |
      WITH
        monthly AS (
          SELECT
            billing_account_id        AS sub_account_id,
            project.id                AS project_id,
            invoice.month             AS yyyymm,
            SUM(cost)                 AS total_cost
          FROM `{billing_export_project}.{billing_export_dataset}.{billing_export_table}`
          WHERE invoice.month IN (
            FORMAT_DATE('%Y%m', DATE_SUB(DATE_TRUNC(CURRENT_DATE('Asia/Tokyo'), MONTH), INTERVAL 1 MONTH)),
            FORMAT_DATE('%Y%m', DATE_SUB(DATE_TRUNC(CURRENT_DATE('Asia/Tokyo'), MONTH), INTERVAL 2 MONTH))
          )
          GROUP BY billing_account_id, project.id, invoice.month
        ),
        prev AS (
          SELECT sub_account_id, project_id, total_cost
          FROM monthly
          WHERE yyyymm = FORMAT_DATE('%Y%m', DATE_SUB(DATE_TRUNC(CURRENT_DATE('Asia/Tokyo'), MONTH), INTERVAL 1 MONTH))
        ),
        prev2 AS (
          SELECT sub_account_id, project_id, total_cost
          FROM monthly
          WHERE yyyymm = FORMAT_DATE('%Y%m', DATE_SUB(DATE_TRUNC(CURRENT_DATE('Asia/Tokyo'), MONTH), INTERVAL 2 MONTH))
        )
      SELECT
        bpl.sub_account_name,
        bpl.project_id,
        ROUND(prev2.total_cost, 2)                                               AS two_months_ago_cost,
        ROUND(prev.total_cost,  2)                                               AS last_month_cost,
        ROUND((prev.total_cost - prev2.total_cost) / prev2.total_cost * 100, 1) AS increase_pct
      FROM prev
      JOIN prev2 USING (sub_account_id, project_id)
      JOIN `{project}.{dataset}.billing_project_links` bpl
        ON  bpl.sub_account_id = prev.sub_account_id
        AND bpl.project_id     = prev.project_id
      WHERE prev2.total_cost > 0             -- ゼロ除算を回避（前々月に課金実績がある場合のみ比較）
        AND prev.total_cost > prev2.total_cost * 1.30  -- 閾値: 30%増加。変更する場合はここを修正
        AND bpl.status = 'ACTIVE'
      ORDER BY increase_pct DESC
    channel: "#cs-alerts"           # 要変更：CS向けチャンネル
    message: "前月の請求金額が前々月より30%以上増加したプロジェクトが検出されました"
    enabled: true

  - name: subscription_cost_surge
    description: |
      プロジェクトに紐づかないサブスクリプション課金（Gemini Enterprise / Looker Studio Pro 等）の
      前月コストが前々月より30%以上増加した場合に通知（月次確認）。
      Billing Export の project.id が NULL / 空文字の行を対象とする。
      閾値を変更する場合は query 内の `* 1.30` を修正する（例: 50%増 → `* 1.50`）。
    schedule: "0 9 7 * *"           # 毎月7日 09:00 JST（月次バッチが5日完了後、Export確定に余裕を持たせて7日）
    query: |
      WITH
        monthly AS (
          SELECT
            billing_account_id          AS billing_account_id,
            service.description         AS service_name,
            invoice.month               AS yyyymm,
            SUM(cost)                   AS total_cost
          FROM `{billing_export_project}.{billing_export_dataset}.{billing_export_table}`
          WHERE invoice.month IN (
            FORMAT_DATE('%Y%m', DATE_SUB(DATE_TRUNC(CURRENT_DATE('Asia/Tokyo'), MONTH), INTERVAL 1 MONTH)),
            FORMAT_DATE('%Y%m', DATE_SUB(DATE_TRUNC(CURRENT_DATE('Asia/Tokyo'), MONTH), INTERVAL 2 MONTH))
          )
            AND (project.id IS NULL OR project.id = '')  -- プロジェクト非紐付きのサブスクリプション課金のみ
          GROUP BY billing_account_id, service.description, invoice.month
        ),
        prev AS (
          SELECT billing_account_id, service_name, total_cost
          FROM monthly
          WHERE yyyymm = FORMAT_DATE('%Y%m', DATE_SUB(DATE_TRUNC(CURRENT_DATE('Asia/Tokyo'), MONTH), INTERVAL 1 MONTH))
        ),
        prev2 AS (
          SELECT billing_account_id, service_name, total_cost
          FROM monthly
          WHERE yyyymm = FORMAT_DATE('%Y%m', DATE_SUB(DATE_TRUNC(CURRENT_DATE('Asia/Tokyo'), MONTH), INTERVAL 2 MONTH))
        )
      SELECT
        prev.billing_account_id,
        prev.service_name,
        ROUND(prev2.total_cost, 2)                                               AS two_months_ago_cost,
        ROUND(prev.total_cost,  2)                                               AS last_month_cost,
        ROUND((prev.total_cost - prev2.total_cost) / prev2.total_cost * 100, 1) AS increase_pct
      FROM prev
      JOIN prev2 USING (billing_account_id, service_name)
      WHERE prev2.total_cost > 0             -- ゼロ除算を回避（前々月に課金実績がある場合のみ比較）
        AND prev.total_cost > prev2.total_cost * 1.30  -- 閾値: 30%増加。変更する場合はここを修正
      ORDER BY increase_pct DESC
    channel: "#business_alerts_billing"
    message: "プロジェクト非紐付きのサブスクリプション課金（Gemini Enterprise / Looker Studio Pro 等）が前月比30%以上増加しました"
    enabled: true
